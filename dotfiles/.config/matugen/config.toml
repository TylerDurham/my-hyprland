[config.wallpaper]
command = "swww"
arguments = ["img", "--transition-type", "center"]
set = false

[config.custom_colors]
blue      = { color = "#0000FF", blend = true }   # bright blue
cyan      = { color = "#00FFFF", blend = true }   # bright cyan
green     = { color = "#00FF00", blend = true }   # bright green
orange    = { color = "#fe640b", blend = true }   # ⚠ no ANSI orange — see note
pink      = { color = "#FF55FF", blend = true }   # ⚠ no ANSI pink — see note
magenta   = { color = "#FF00FF", blend = true }   # bright magenta
red       = { color = "#FF0000", blend = true }   # bright red
yellow    = { color = "#FFFF00", blend = true }   # bright yellow

# [templates.hyprland]
# input_path = '~/.config/matugen/templates/hyprland-colors.conf'
# output_path = '~/.config/matugen/hyprland.conf'

[templates.waybar]
input_path = '~/.config/matugen/templates/colors.css'
output_path = '~/.config/matugen/waybar.css'
# post_hook = 'pkill -SIGUSR2 waybar'

