[config.wallpaper]
command = "swww"
arguments = ["img", "--transition-type", "center"]
set = false

[templates.hyprland]
input_path = '~/.config/matugen/templates/hyprland-colors.conf'
output_path = '~/.config/dtd/themes/matugen/hyprland.conf'
[templates.waybar]
input_path = '~/.config/matugen/templates/colors.css'
output_path = '~/.config/dtd/themes/matugen/waybar.css'
post_hook = 'pkill -SIGUSR2 waybar'

[templates.wlogout]
input_path = '~/.config/matugen/templates/colors.css'
output_path = '~/.config/wlogout/styles/colors.css'

[templates.swaync]
input_path = '~/.config/matugen/templates/colors.css'
output_path = '~/.config/dtd/themes/matugen/swaync.css'
post_hook = 'swaync-client -rs'

[templates.rofi]
input_path = '~/.config/matugen/templates/rofi-colors.rasi'
output_path = '~/.config/dtd/themes/matugen/rofi.rasi'

[templates.gtk3]
input_path = '~/.config/matugen/templates/matugen-gtk.css'
output_path = '~/.config/gtk-3.0/gtk.css'

[templates.gtk4]
input_path = '~/.config/matugen/templates/matugen-gtk.css'
output_path = '~/.config/gtk-4.0/gtk.css'

