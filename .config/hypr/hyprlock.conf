source = $HOME/.config/my/current/hyprland.conf

auth {
    fingerprint {
        enabled = true
        ready_message = Scan fingerprint to unlock
        present_message = Scanning fingerprint
        retry_delay = 250
    }
    # Ensure PAM is still enabled for password fallback
    pam:enabled = true
    pam:module = hyprlock
}

# BACKGROUND
background {
    monitor =
    path = ~/.config/my/background
    blur_passes = 2
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# GENERAL
general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = false
}

# Time-Hour
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%I")</span>"
    color = $green_trans
    font_size = 155
    font_family = SF Pro Display
    position = -80, 290
    halign = center
    valign = center
}

# Time-Minute
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%M")</span>"
    color = $accent1
    color = rgba(255, 255, 255, 0.75) 
    font_size = 175
    font_family = SF Pro Display Bold 
    position = 0, 100
    halign = center
    valign = center
}

# Day-Month-Date
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%a, %B %d")"
    color = rgba(255, 255, 255, .75)
    font_size = 32
    font_family = BioRhyme
    position = 20, -190
    halign = center
    valign = center
}

label {
  text = <span> 󰈷 </span>
  font_size = 48
  color = $foreground_trans
  position = 0, -390
  halign = center
  valign = center
}
#
# INPUT FIELD
input-field {
    monitor =
    size = 600, 80
    outline_thickness = 2
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = rgba(0, 0, 0, 0)
    inner_color = $background_trans
    font_color = rgb(200, 200, 200)
    fade_on_empty = false
    font-size = 36
    font_family = SF Pro Display
    placeholder_text =    E n t e r  P a s s w o r d
    hide_input = false
    position = 0, -490
    halign = center
    valign = center
}

# CURRENT SONG
label {
    monitor =
    text = cmd[update:1000] echo "$(~/.config/hypr/scripts/song-detail.sh)" 
    color = rgba(255, 255, 255, .50)
    font_size = 18
    size = 600, 80
    font_family = SF Pro Display
    position = -100, 20
    halign = right
    valign = bottom
}

label {
  text = <span>󰎆 </span>
  font_size = 36
  color = $accent2_trans
  position = -100, 66
  halign = right
  valign = bottom
}

